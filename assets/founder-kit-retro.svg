<svg xmlns="http://www.w3.org/2000/svg" width="520" height="260" viewBox="0 0 520 260" role="img" aria-labelledby="title desc">
  <title id="title">founder-kit agent-first loop</title>
  <desc id="desc">A simple retro animation for founder-kit showing Scout-01 moving founder intent through an agent loop.</desc>
  <style>
    .bg { fill: #07100a; }
    .screen { fill: #0d1b12; stroke: #6cff7c; stroke-width: 2; }
    .line { stroke: #6cff7c; stroke-width: 2; opacity: 0.45; }
    .text { font-family: "SFMono-Regular", "Cascadia Mono", "Roboto Mono", "Courier New", monospace; }
    .title { fill: #d9ffe0; font-size: 34px; font-weight: 700; }
    .soft { fill: #8fcf99; font-size: 15px; }
    .green { fill: #6cff7c; font-size: 18px; }
    .amber { fill: #ffd166; font-size: 18px; }
    .cursor { fill: #6cff7c; }
  </style>

  <rect class="bg" width="520" height="260" rx="24"/>
  <rect class="screen" x="24" y="24" width="472" height="212" rx="14"/>
  <line class="line" x1="24" y1="82" x2="496" y2="82"/>

  <text class="text title" x="50" y="64">founder-kit</text>
  <text class="text soft" x="315" y="62">SCOUT-01</text>

  <text class="text soft" x="50" y="118">founder intent</text>
  <text class="text green" x="204" y="118">-&gt;</text>
  <text class="text soft" x="242" y="118">agent work</text>
  <text class="text green" x="362" y="118">-&gt;</text>
  <text class="text soft" x="400" y="118">signal</text>

  <text class="text amber" x="50" y="165">$ founder</text>

  <g class="text green" font-size="19">
    <text x="50" y="202" opacity="0">
      signal -&gt; brief
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.10;0.30;0.40" dur="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="202" opacity="0">
      brief -&gt; agent
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.30;0.40;0.60;0.70" dur="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="202" opacity="0">
      agent -&gt; ship
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.58;0.68;0.84;0.92" dur="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="202" opacity="0">
      ship -&gt; cadence
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.82;0.92;1" dur="4.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect class="cursor" x="223" y="186" width="12" height="21">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.7s" repeatCount="indefinite"/>
    <animate attributeName="x" values="166;178;184;196;223" keyTimes="0;0.35;0.55;0.78;1" dur="4.8s" repeatCount="indefinite"/>
  </rect>
</svg>
